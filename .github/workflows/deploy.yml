# ────────────────────────────────────────────
# Wander Backend — Deploy to AWS ECS (FIXED)
# ────────────────────────────────────────────

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: wander-backend
  ECS_CLUSTER: waader-cluster   
  ECS_SERVICE: wander-backend-service
  TASK_DEFINITION: task-wander-backend   
  CONTAINER_NAME: wander-backend         

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ────────────────
      # 1. Checkout code
      # ────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ────────────────
      # 2. AWS login
      # ────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ────────────────
      # 3. Login to ECR
      # ────────────────
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ────────────────
      # 4. Build & Push image
      # ────────────────
      - name: Build & push Docker image
        id: build-image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$REGISTRY/$ECR_REPO:$IMAGE_TAG

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      # ────────────────
      # 5. Download current task definition
      # ────────────────
      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $TASK_DEFINITION \
            --query taskDefinition > task-def.json

      # ────────────────
      # 6. Update image in task definition
      # ────────────────
      - name: Update task definition image
        id: task-def
        run: |
          NEW_IMAGE=${{ steps.build-image.outputs.image }}

          cat task-def.json | jq \
            --arg IMAGE "$NEW_IMAGE" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > new-task-def.json

      # ────────────────
      # 7. Register new task definition
      # ────────────────
      - name: Register new task definition
        id: register-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      # ────────────────
      # 8. Deploy to ECS
      # ────────────────
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition ${{ steps.register-task-def.outputs.task_def_arn }} \
            --force-new-deployment